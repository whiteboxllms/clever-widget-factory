openapi: "3.0.0"
info:
  title: GetEntityObservations
  version: "1.0"
paths:
  /getEntityObservations:
    get:
      operationId: getEntityObservations
      description: Retrieves observations recorded against a CWF entity (tool, part, or action)
      parameters:
        - name: entityId
          in: query
          required: false
          schema:
            type: string
          description: UUID of the entity
        - name: entityType
          in: query
          required: false
          schema:
            type: string
            enum:
              - tool
              - part
              - action
          description: Type of the entity
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
          description: ISO date string to filter observations from (inclusive)
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
          description: ISO date string to filter observations to (inclusive)
      responses:
        "200":
          description: Observations retrieved successfully
